
  <h4 class="ui dividing header">Personal Information</h4>
  <form class="ui form hidden" action="" method="POST" id='form_personal'>
    <div class='field'>
      <label>Name</label>
        <div class="two fields">
          <div class="field">
            <input name='first_name' placeholder='first name' type='text'>
          </div>
          <div class="field">
            <input name='last_name' placeholder='last name' type='text'>
          </div>
        </div>
      </div>

      <div class='field'>
        <label>Address</label>
        <div class="fields">
          <div class="twelve wide field">
            <input name='street_1' placeholder='street address' type='text'>
          </div>
          <div class="four wide field">
            <input name="street_2" placeholder='Apt #' type="text">
          </div>
        </div>
      </div>
      <div class="two fields">
        <div class="field">
          <label>State</label>
          <select class="ui fluid dropdown">
            <option value=''>State</option>
            {% for state_name, state_id in states  %}
              <option value="{{ state_id }}">{{ state_name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="field">
          <label>Zip code</label>
            <input name="zip_code" type="text">
         </div>
      </div>
      <div class="two fields">
        <div class="field">
          <label>Main Phone</label>
          <input name="phone" type="text">
        </div>
        <div class="field">
          <label>Alternate Phone</label>
           <input name="alternate_phone" type="text">
         </div>
      </div>
      <div class="two fields">
        <div class="field">
          <label>Emergency Contact Phone</label>
           <input name="emergency_contact_phone" type="text">
        </div>
        <div class="field">
          <label>Emergency Contact Name</label>
            <input name="emergency_contact_name" type="text">
         </div>
      </div>
    <a class='ui violet button button-primary'
      tabindex="0" href="#" onclick="javascript: $('#form_personal').hide();$('#table_personal').show();"/>Save</a>
  </form>

  <table class="ui table" id='table_personal'>
    <thead>
      <tr>
        <th>Name</th>
        <th>Address</th>
        <th>Phone</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>John Doe</td>
        <td>5308 Flamingo Drive<br>Rowlett, TX 75089</td>
        <td>(214) 542 6153<br>(214) 542 6133</td>
        <td> <i class='write icon link blue' onclick="javascript: $('#form_personal').show();$('#table_personal').hide();"></i> </td>
      </tr>
    </tbody>
  </table>
